<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - FraudGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; }
    .app-navbar { background: linear-gradient(90deg, #1f2937, #0f172a); }
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06); }
    .auth-card { margin-top: 2rem; }
    .navbar-brand { letter-spacing: 0.5px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🛡️ FraudGuard</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center" id="navLinks">
        <!-- filled in by JS depending on login state -->
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">
  <div id="alertBox"></div>

  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card auth-card">
        <div class="card-body p-4">
          <h3 class="text-center mb-4">Create Account</h3>
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" id="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <input type="password" id="confirmPassword" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
          </form>
          <p class="text-center mt-3 mb-0">
            Already have an account? <a href="/login">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function showAlert(message, type) {
    const box = document.getElementById('alertBox');
    box.innerHTML = `
      <div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>`;
  }

  async function loadNav() {
    const navLinks = document.getElementById('navLinks');
    try {
      const res = await fetch('/api/session');
      const data = await res.json();
      if (data.authenticated) {
        window.location.href = '/home';
        return;
      }
      navLinks.innerHTML = `
        <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
        <li class="nav-item"><a class="btn btn-light btn-sm ms-lg-2" href="/register">Register</a></li>`;
    } catch (err) {
      console.error('Failed to load session info', err);
    }
  }

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
      showAlert('Passwords do not match.', 'danger');
      return;
    }

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, confirm_password: confirmPassword })
      });
      const data = await res.json();

      if (data.success) {
        showAlert(data.message || 'Account created. Redirecting to login...', 'success');
        setTimeout(() => { window.location.href = '/login'; }, 1200);
      } else {
        showAlert(data.message || 'Registration failed.', 'danger');
      }
    } catch (err) {
      showAlert('Something went wrong. Please try again.', 'danger');
    }
  });

  loadNav();
</script>
</body>
</html>
