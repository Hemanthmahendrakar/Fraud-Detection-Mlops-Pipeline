<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - FraudGuard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; }
    .app-navbar { background: linear-gradient(90deg, #1f2937, #0f172a); }
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06); }
    .result-card.result-fraud { border-left: 6px solid #dc3545; }
    .result-card.result-safe { border-left: 6px solid #198754; }
    .navbar-brand { letter-spacing: 0.5px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🛡️ FraudGuard</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center" id="navLinks">
        <!-- filled in by JS depending on login state -->
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4 mb-5">
  <div id="alertBox"></div>

  <div class="row g-4">
    <div class="col-lg-7">
      <div class="card">
        <div class="card-body p-4">
          <h4 class="mb-4">Check a Transaction</h4>
          <form id="predictForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Step (time unit)</label>
                <input type="number" id="step" class="form-control" min="0" value="1" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Transaction Type</label>
                <select id="type" class="form-select" required>
                  <option value="CASH_IN">CASH_IN</option>
                  <option value="CASH_OUT">CASH_OUT</option>
                  <option value="DEBIT">DEBIT</option>
                  <option value="PAYMENT">PAYMENT</option>
                  <option value="TRANSFER">TRANSFER</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Amount</label>
                <input type="number" step="0.01" id="amount" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Old Balance (Origin)</label>
                <input type="number" step="0.01" id="oldbalanceOrg" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">New Balance (Origin)</label>
                <input type="number" step="0.01" id="newbalanceOrig" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Old Balance (Destination)</label>
                <input type="number" step="0.01" id="oldbalanceDest" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">New Balance (Destination)</label>
                <input type="number" step="0.01" id="newbalanceDest" class="form-control" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">Predict</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div id="resultBox" class="card mb-4">
        <div class="card-body p-4 text-center text-muted">
          <p class="mb-0">Submit a transaction to see the prediction here.</p>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-4">
          <h5 class="mb-3">Recent Predictions</h5>
          <div id="historyBox">
            <p class="text-muted mb-0">Loading...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function showAlert(message, type) {
    const box = document.getElementById('alertBox');
    box.innerHTML = `
      <div class="alert alert-${type} alert-dismissible fade show" role="alert">
        ${message}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>`;
  }

  async function loadNav() {
    const navLinks = document.getElementById('navLinks');
    try {
      const res = await fetch('/api/session');
      const data = await res.json();

      if (!data.authenticated) {
        window.location.href = '/login';
        return;
      }

      navLinks.innerHTML = `
        <li class="nav-item"><a class="nav-link" href="/home">Dashboard</a></li>
        <li class="nav-item"><span class="nav-link text-white-50">Hi, ${data.username}</span></li>
        <li class="nav-item"><button class="btn btn-outline-light btn-sm ms-lg-2" id="logoutBtn">Logout</button></li>`;
      document.getElementById('logoutBtn').addEventListener('click', logout);

      loadHistory();
    } catch (err) {
      console.error('Failed to load session info', err);
    }
  }

  async function logout() {
    try {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    } catch (err) {
      showAlert('Logout failed. Please try again.', 'danger');
    }
  }

  async function loadHistory() {
    const historyBox = document.getElementById('historyBox');
    try {
      const res = await fetch('/api/history');
      const data = await res.json();

      if (!data.success || data.history.length === 0) {
        historyBox.innerHTML = '<p class="text-muted mb-0">No predictions yet.</p>';
        return;
      }

      let rows = data.history.map(r => `
        <tr>
          <td>${r.type}</td>
          <td>${Number(r.amount).toFixed(2)}</td>
          <td>${r.prediction === 1
              ? '<span class="badge bg-danger">Fraud</span>'
              : '<span class="badge bg-success">Legit</span>'}</td>
        </tr>`).join('');

      historyBox.innerHTML = `
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead><tr><th>Type</th><th>Amount</th><th>Result</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    } catch (err) {
      historyBox.innerHTML = '<p class="text-danger mb-0">Failed to load history.</p>';
    }
  }

  document.getElementById('predictForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const payload = {
      step: document.getElementById('step').value,
      type: document.getElementById('type').value,
      amount: document.getElementById('amount').value,
      oldbalanceOrg: document.getElementById('oldbalanceOrg').value,
      newbalanceOrig: document.getElementById('newbalanceOrig').value,
      oldbalanceDest: document.getElementById('oldbalanceDest').value,
      newbalanceDest: document.getElementById('newbalanceDest').value,
    };

    try {
      const res = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (!data.success) {
        showAlert(data.message || 'Prediction failed.', 'danger');
        return;
      }

      const resultBox = document.getElementById('resultBox');
      const isFraud = data.prediction === 1;
      resultBox.className = `card mb-4 result-card ${isFraud ? 'result-fraud' : 'result-safe'}`;
      resultBox.innerHTML = `
        <div class="card-body p-4 text-center">
          <h5 class="text-uppercase text-muted mb-2">Prediction Result</h5>
          <h2 class="fw-bold ${isFraud ? 'text-danger' : 'text-success'}">${data.label}</h2>
          ${data.probability !== null ? `<p class="mb-0 text-muted">Fraud probability: ${data.probability}%</p>` : ''}
        </div>`;

      loadHistory();
    } catch (err) {
      showAlert('Something went wrong. Please try again.', 'danger');
    }
  });

  loadNav();
</script>
</body>
</html>
